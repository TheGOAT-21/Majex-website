<div *ngIf="currentEvent && isVisible"
     class="floating-event"
     [class.visible]="isVisible">
  <button (click)="onDismiss()"
          class="absolute top-2 right-2 z-10 w-6 h-6 flex items-center justify-center rounded-full bg-black/50 text-white hover:bg-black/70 transition-colors"
          aria-label="Fermer">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>

  <div class="relative">
    <img *ngIf="currentEvent.image || currentEvent.image_url"
         [src]="currentEvent.image || currentEvent.image_url"
         [alt]="currentEvent.title"
         class="h-24 w-full object-cover rounded-lg">
    <div *ngIf="!currentEvent.image && !currentEvent.image_url"
         class="h-24 w-full bg-gradient-to-br from-majex-primary to-majex-secondary rounded-lg flex items-center justify-center text-white text-4xl">
      {{ currentEvent.type === 'formation' ? '🎓' : currentEvent.type === 'seminaire' ? '💼' : currentEvent.type === 'conference' ? '🎤' : '🎉' }}
    </div>
  </div>

  <div class="mt-3 space-y-2">
    <h3 class="font-bold text-gray-900 line-clamp-1">
      {{ currentEvent.title }}
    </h3>

    <p class="text-sm text-gray-600">
      {{ formatDate(currentEvent.date) }}
    </p>

    <button (click)="onViewEvent()"
            class="w-full bg-majex-primary hover:bg-majex-primary-dark text-white font-semibold py-2 px-4 rounded-lg transition-colors">
      Voir
    </button>
  </div>
</div>
